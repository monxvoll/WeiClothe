services:

  keycloak:
    image: quay.io/keycloak/keycloak:24.0.1
    container_name: weiclothe_iam
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      JAVA_OPTS_APPEND: "-Xms128m -Xmx256m"
    command: start-dev --import-realm
    ports:
      - "9090:8080"
    volumes:
      - keycloak_data:/opt/keycloak/data
      - ./realm-export.json:/opt/keycloak/data/import/realm.json:ro
    mem_limit: 384m

  # ── Production Keycloak─
  # keycloak:
  #   image: quay.io/keycloak/keycloak:24.0.1
  #   container_name: weiclothe_iam
  #   environment:
  #     KEYCLOAK_ADMIN: ${KC_ADMIN_USER}
  #     KEYCLOAK_ADMIN_PASSWORD: ${KC_ADMIN_PASS}
  #     KC_DB: postgres
  #     KC_DB_URL: jdbc:postgresql://${KC_DB_HOST}:5432/keycloak
  #     KC_DB_USERNAME: ${KC_DB_USER}
  #     KC_DB_PASSWORD: ${KC_DB_PASS}
  #     KC_HOSTNAME: ${KC_HOSTNAME}
  #   command: start --optimized
  #   ports:
  #     - "8443:8443"
  #   volumes:
  #     - keycloak_data:/opt/keycloak/data


  # Dev broker: Apache Kafka KRaft (JVM). Redpanda was removed — its binary often exits 132 (SIGILL)
  # on hosts without expected SIMD/AVX; Kafka runs on a wider range of CPUs.
  kafka:
    image: apache/kafka:3.9.0
    hostname: kafka
    container_name: weiclothe_kafka
    ports:
      - "9093:9093"
    environment:
      # KRaft single-node; listener names match apache/kafka docker examples (avoid INTERNAL/EXTERNAL + 0.0.0.0 advertised bugs on 3.9).
      CLUSTER_ID: "4L6g3nShT-eMCtK--X86sw"
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9094
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENERS: CONTROLLER://:9094,PLAINTEXT://:9092,PLAINTEXT_HOST://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_LOG_SEGMENT_BYTES: 1073741824
      KAFKA_LOG_DIRS: "/var/lib/kafka/data"
      KAFKA_HEAP_OPTS: "-Xms128m -Xmx384m"
    volumes:
      - kafka_kraft_data:/var/lib/kafka/data
    mem_limit: 768m
    healthcheck:
      test: [ "CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 45s

  postgres:
    image: postgres:18-alpine
    # TODO: Add production image 18.3
    container_name: weiclothe_db
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    mem_limit: 256m
    # TODO: Add production healthcheck mem limit 512m
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # Dev S3-compatible store (prod: AWS S3 + IAM on EC2).
  minio:
    image: minio/minio:latest
    container_name: weiclothe_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-miniosecret}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    mem_limit: 256m
    healthcheck:
      test: [ "CMD-SHELL", "curl -fsS http://127.0.0.1:9000/minio/health/live || exit 1" ]
      interval: 5s
      timeout: 5s
      retries: 8
      start_period: 10s

  minio-init:
    image: minio/mc:latest
    container_name: weiclothe_minio_init
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-miniosecret}
      S3_BUCKET: ${S3_BUCKET:-weicloth}
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 \"$${MINIO_ROOT_USER}\" \"$${MINIO_ROOT_PASSWORD}\";
      mc mb local/$${S3_BUCKET} --ignore-existing;
      mc anonymous set download local/$${S3_BUCKET};
      exit 0
      "

  # UI web for topics/messages: image "Redpanda Console" but speaks Kafka standard protocol.
  # Broker = service `kafka` (Apache Kafka). URL host: http://localhost:8080
  kafka-ui:
    image: docker.redpanda.com/redpandadata/console:v2.7.2
    container_name: weiclothe_kafka_ui
    ports:
      - "8080:8080"
    environment:
      KAFKA_BROKERS: kafka:9092
    depends_on:
      kafka:
        condition: service_healthy

  kafka-init:
    image: apache/kafka:3.9.0
    container_name: weiclothe_kafka_init
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: [ "/bin/bash", "-c" ]
    command:
      - |
        set -e
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 \
          --create --if-not-exists --topic "$$KAFKA_TOPIC_ANALYSIS" --partitions 3 --replication-factor 1
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 \
          --create --if-not-exists --topic "$$KAFKA_TOPIC_ANALYSIS_DLQ" --partitions 1 --replication-factor 1
    environment:
      KAFKA_TOPIC_ANALYSIS: ${KAFKA_TOPIC_ANALYSIS:-vusion.analysis.request}
      KAFKA_TOPIC_ANALYSIS_DLQ: ${KAFKA_TOPIC_ANALYSIS_DLQ:-vusion.analysis.dlq}

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: weiclothe_api
    ports:
      - "8000:8080" # Exposed externally as 8000 to not conflict with local kafka-ui
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      - DB_SSLMODE=disable
      - KAFKA_BROKERS=kafka:9092
      - KEYCLOAK_BASE_URL=http://keycloak:8080
      - KEYCLOAK_REALM=${KEYCLOAK_REALM:-weiclothe}
      - KEYCLOAK_CLIENT_ID=${KEYCLOAK_CLIENT_ID:-go-api}
      - KEYCLOAK_CLIENT_SECRET=${KEYCLOAK_CLIENT_SECRET}
      - HTTP_ADDR=:8080
      - KAFKA_TOPIC_ANALYSIS=${KAFKA_TOPIC_ANALYSIS:-vusion.analysis.request}
      # Go API stages raw uploads to MinIO/S3 before publishing analysis jobs (same bucket as vusion-ml).
      - AWS_ACCESS_KEY_ID=${MINIO_ROOT_USER:-minio}
      - AWS_SECRET_ACCESS_KEY=${MINIO_ROOT_PASSWORD:-miniosecret}
      - AWS_REGION=${AWS_REGION:-us-east-1}
      - S3_BUCKET=${S3_BUCKET:-weicloth}
      - S3_ENDPOINT_URL=http://minio:9000
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      # Keycloak doesn't have a healthcheck in this compose file so we use started
      keycloak:
        condition: service_started

  # Python ML: consumes KAFKA_TOPIC_ANALYSIS, writes Aurora/Postgres + S3.
  vusion-ml:
    build:
      context: ./services/vusion-ml
      dockerfile: Dockerfile
      args:
        BUILDKIT_INLINE_CACHE: "1"
    container_name: weiclothe_vusion_ml
    ports:
      - "5000:5000"
    environment:
      KAFKA_BROKERS: kafka:9092
      # Misma URL interna que la API. Si los JWT fallan en EC2 (issuer distinto), define
      # VISION_ML_KEYCLOAK_BASE_URL=http://<IP-pública-EC2>:9090 en .env (y abre el puerto).
      KEYCLOAK_BASE_URL: ${VISION_ML_KEYCLOAK_BASE_URL:-http://keycloak:8080}
      KEYCLOAK_REALM: ${KEYCLOAK_REALM:-weiclothe}
      KEYCLOAK_CLIENT_ID: ${VISION_ML_CLIENT_ID:-vision-ml}
      KEYCLOAK_CLIENT_SECRET: ${VISION_ML_CLIENT_SECRET:?VISION_ML_CLIENT_SECRET must be set in .env (see .env-example)}
      KAFKA_TOPIC_ANALYSIS: ${KAFKA_TOPIC_ANALYSIS:-vusion.analysis.request}
      KAFKA_TOPIC_ANALYSIS_DLQ: ${KAFKA_TOPIC_ANALYSIS_DLQ:-vusion.analysis.dlq}
      KAFKA_GROUP_ID: ${KAFKA_GROUP_ID:-vusion-ml-analysis}
      ENABLE_ANALYSIS_CONSUMER: ${ENABLE_ANALYSIS_CONSUMER:-true}
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      DB_SSLMODE: disable
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minio}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-miniosecret}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      S3_BUCKET: ${S3_BUCKET:-weicloth}
      S3_ENDPOINT_URL: http://minio:9000
      # Base URL stored in clothes.image_url for browsers (path-style: <base>/<key>). Override for CDN/prod host.
      # Dev: minio-init sets anonymous download on bucket so plain URLs work without presigning.
      S3_PUBLIC_BASE_URL: ${S3_PUBLIC_BASE_URL:-http://localhost:9000/weicloth}
      YOLO_MODEL: ${YOLO_MODEL:-yolov8n-seg.pt}
      CLIP_MODEL: ${CLIP_MODEL:-openai/clip-vit-base-patch32}
      MIDDLEWARE_STRICT_STARTUP: ${MIDDLEWARE_STRICT_STARTUP:-true}
      MIDDLEWARE_HTTP_TIMEOUT_SECONDS: ${MIDDLEWARE_HTTP_TIMEOUT_SECONDS:-10}
      KEYCLOAK_BOOTSTRAP_ATTEMPTS: ${KEYCLOAK_BOOTSTRAP_ATTEMPTS:-40}
      KEYCLOAK_BOOTSTRAP_DELAY_SEC: ${KEYCLOAK_BOOTSTRAP_DELAY_SEC:-3}
      FLASK_DEBUG: "false"
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      keycloak:
        condition: service_started
    healthcheck:
      test: [ "CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/healthz', timeout=5)\"" ]
      interval: 15s
      timeout: 8s
      retries: 6
      start_period: 300s

volumes:
  keycloak_data:
  kafka_kraft_data:
  postgres_data:
  minio_data:
